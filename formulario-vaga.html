<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>Dados Pessoais</legend><label>Nome: <input type="text"></label><br><label>Endereço: <input
                    type="text"></label><br><label>Cidade: <input type="text"></label><br><label>Estado: <select>
                    <option selected="">Rio de Janeiro</option>
                    <option>São Paulo</option>
                    <option>Minas Gerais</option>
                    <option>Bahia</option>
                    <option>Rio Grande do Sul</option>
                    <option>Pernambuco</option>
                    <option>Ceará</option>
                </select></label>
        </fieldset>
        <fieldset>
            <legend>Dados Profissionais</legend><label>Natureza do Cargo: <select>
                    <option selected="">Gerência</option>
                    <option>Financeiro</option>
                    <option>Recepção</option>
                    <option>Administrativo</option>
                    <option>Jurídico</option>
                </select></label><br><br>Área de Interesse:<br><label><input type="checkbox">
                Computação</label><br><label><input type="checkbox"> Biologia</label><br><label><input type="checkbox"> Meio
                Ambiente</label><br><label><input type="checkbox"> Engenharia</label><br><label><input type="checkbox">
                História</label><br><br><label>Mini Currículo:<br><textarea rows="3" cols="40"></textarea></label>
        </fieldset><br><button type="submit">Enviar</button> <button type="reset">Limpar</button>
    </form>
</body>
</html>
